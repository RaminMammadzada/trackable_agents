<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trackable Agents</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="hero">
    <div>
      <p class="eyebrow">Passive Agent Observability</p>
      <h1>Trackable Agents</h1>
      <p class="lede">Monitor Codex, Claude Code, and Copilot sessions through one append-only ledger.</p>
    </div>
    <div class="stats" id="summary"></div>
  </header>

  <main class="layout">
    <section class="panel">
      <div class="panel-header">
        <h2>Runs</h2>
        <button id="refreshRuns">Refresh</button>
      </div>
      <div id="runs" class="list"></div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>Run Detail</h2>
        <span id="selectedRun">Select a run</span>
      </div>
      <div id="runDetail" class="detail empty">No run selected.</div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>Failures</h2>
      </div>
      <div id="failures" class="list"></div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>Lessons Queue</h2>
      </div>
      <div id="lessons" class="list"></div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
