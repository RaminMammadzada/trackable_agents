services:
  control-plane:
    build:
      context: ./apps/control-plane
    container_name: trackable-agents-control-plane
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/trackable_agents
      SPRING_DATASOURCE_USERNAME: trackable_agents
      SPRING_DATASOURCE_PASSWORD: trackable_agents
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
      APP_STORAGE_ARTIFACT_ROOT: /data/artifacts
    ports:
      - "8080:8080"
    volumes:
      - ./artifacts:/data/artifacts
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started

  postgres:
    image: postgres:16
    container_name: trackable-agents-postgres
    environment:
      POSTGRES_DB: trackable_agents
      POSTGRES_USER: trackable_agents
      POSTGRES_PASSWORD: trackable_agents
    ports:
      - "5432:5432"
    volumes:
      - ./ops/docker/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trackable_agents -d trackable_agents"]
      interval: 5s
      timeout: 3s
      retries: 20

  tempo:
    image: grafana/tempo:2.7.2
    container_name: trackable-agents-tempo
    command:
      - "-config.file=/etc/tempo.yaml"
    volumes:
      - ./ops/docker/tempo.yaml:/etc/tempo.yaml:ro
      - ./ops/docker/data/tempo:/tmp/tempo
    ports:
      - "3200:3200"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.126.0
    container_name: trackable-agents-otel
    command:
      - "--config=/etc/otelcol-contrib/config.yaml"
    volumes:
      - ./ops/docker/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - tempo

  grafana:
    image: grafana/grafana:12.0.2
    container_name: trackable-agents-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - ./ops/docker/data/grafana:/var/lib/grafana
      - ./ops/docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - tempo
