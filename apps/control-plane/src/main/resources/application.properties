spring.application.name=control-plane

server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/trackable_agents}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:trackable_agents}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:trackable_agents}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}

app.storage.artifact-root=${APP_STORAGE_ARTIFACT_ROOT:../../artifacts}
app.payload.max-size-bytes=${APP_PAYLOAD_MAX_SIZE_BYTES:32768}
app.redaction.enabled=true
app.github.webhook-secret=${APP_GITHUB_WEBHOOK_SECRET:}
